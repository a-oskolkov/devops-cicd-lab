name: Python Check

on:
  workflow_call:
    inputs:
      python-version:
        required: true
        type: string
      command:
        required: true
        type: string
      artifact-name:
        required: false
        type: string
        default: ""
      artifact-path:
        required: false
        type: string
        default: ""

jobs:
  python-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip
          cache-dependency-path: |
            app/src/requirements.txt
            app/requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install -r app/requirements-dev.txt

      - name: Run check
        run: ${{ inputs.command }}

      - name: Upload artifact
        if: ${{ always() && inputs.artifact-name != '' && inputs.artifact-path != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: ${{ inputs.artifact-path }}
