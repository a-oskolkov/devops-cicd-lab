name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  PYTHON_VERSION: "3.12"
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            app/src/requirements.txt
            app/requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install -r app/requirements-dev.txt

      - name: Compile Python sources
        run: python -m compileall app/src

      - name: Prepare build artifact
        run: |
          mkdir -p build-artifacts
          tar -czf build-artifacts/app-source.tar.gz \
            app/Dockerfile \
            app/requirements-dev.txt \
            app/src \
            app/tests \
            pyproject.toml

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-build-artifact
          path: build-artifacts/app-source.tar.gz

  lint:
    name: Lint
    needs: build
    uses: ./.github/workflows/python-check.yml
    with:
      python-version: "3.12"
      command: ruff check app/src app/tests

  test:
    name: Test
    needs: build
    strategy:
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
    uses: ./.github/workflows/python-check.yml
    with:
      python-version: ${{ matrix.python-version }}
      command: |
        mkdir -p test-results
        set -o pipefail
        python -m unittest discover -s app/tests 2>&1 | tee test-results/unittest.txt
      artifact-name: unittest-results-${{ matrix.python-version }}
      artifact-path: test-results/

  security-scan:
    name: Security Scan
    needs: build
    uses: ./.github/workflows/python-check.yml
    with:
      python-version: "3.12"
      command: pip-audit -r app/src/requirements.txt

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs:
      - lint
      - test
      - security-scan

    steps:
      - name: Confirm quality gate
        run: echo "All checks passed"

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: quality-gate
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase image name
        id: image
        run: echo "image_name=${REGISTRY}/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.image_name }}
          tags: |
            type=sha,format=long,prefix=sha-

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: app
          file: app/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
